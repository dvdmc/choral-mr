/**:
  ros__parameters:

    use_sim_time: true

    frequency: 0.8 # Frequency of the sensor in Hz. -1 means that we are using a service instead of a timer
    stride: 16 # Stride of the sensor for generating the pointcloud
    max_depth: 4.5 # Maximum distance of the sensor
    publish_freespace_point_cloud: true
    origin_frame_id: "map" # Origin of the sensor will be published in this frame for the poses
    sensor_frame_id: "camera_link" # Sensor messages will be published in this frame

    save_inference: false
    save_inference_path: '/root/datasets/dataset/'

    # Config for bridge is in sensors_tools/bridge/{bridge_type}.py
    bridge:
      bridge_type: 'ros' # Source of the sensor. It can be 'airsim' or 'ros'
      data_types: ['rgb', 'depth', 'semantic'] # Data types to be published. It can be 'rgb', 'depth', 'semantic', 'pointcloud'
      origin_tf: "map"
      poses_tf: "camera_link"
      rgb_topic: "/drone1/camera/color/image_raw_decompressed"
      camera_info_topic: "/drone1/camera/color/camera_info"
      depth_topic: "/drone1/camera/aligned_depth_to_color/image_raw_decompressed"

    # Config for inference is in sensors_tools/inference/semantic_segmentation/{semantic_segmentation_type}.py
    semantic_segmentation_type: 'naradio'
    inference:
      semantic_dataset_type: "custom_set" # Number of classes 4 MAKE SURE TO SET IN MAP!
      semantic_feature_type: "feature_vector"
      custom_set_labels: ['floor','cable','pebbles', 'animal'] # cardboard, debris, cables, stones, 
      model_version: "radio_v2.5-b"
      lang_model: "siglip"
      input_resolution: [720,720]
      # colors: [[0,0,0],[0,0,255],[0,255,0],[255,0,0]]