/**:
  ros__parameters:
    resolution: 0.1
    frame_id: "earth"
    base_frame_id: "camera_link"
    # sem_dim: 7
    sem_dim: 11

    occupancy_min_z: -100.0
    occupancy_max_z: 100.0

    sensor_model:
      max_range: -1.0
      min_range: 1.0
      hit: 0.7
      miss: 0.4
      min: 0.12
      max: 0.97

    latch: false

    semantics:
      semantic_type: probabilities
      alpha_reg: 0.3
      min: 0.12
      max: 0.97

      # problematic_classes: [2,3] # ['cable','pebbles']
      problematic_classes: [2,3,6] # ['cable','pebbles', 'cardboard']

      # task_classes: [4] # ['animal']
      task_classes: [4,7,8,10] # ['animal', 'simba', 'lynx']