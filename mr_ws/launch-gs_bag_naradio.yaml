name: ground_station
attach: true
root: ./
startup_window: main
windows:
  # Platform
  - main:
      layout: tiled
      panes:
        - echo "ros2 bag play /root/bags/run19.bag --clock"
        - echo "source install/setup.bash && ros2 launch mr_het_coord_ros mr_coord_real.launch num_agents:=2 map:=real"
        
  - visualization:
      layout: tiled
      panes:
        - ros2 run rviz2 rviz2 -d ./config/ground_station/real.rviz 
            --ros-args -p use_sim_time:=true

  - mapping:
      layout: tiled
      panes:
        - sleep 5; source .venv-sem/bin/activate && source install/setup.bash && ros2 launch sensors_tools_ros semantic_sensor_bag_naradio.launch.xml
        - sleep 5; source install/setup.bash && ros2 launch bloomxai_ros bonxai_mapping_bag.launch.xml  config_file:=src/Bloomxai/bloomxai_ros/config/bloomxai_naradio.yaml
        - sleep 10; source .venv-sem/bin/activate && source install/setup.bash && ros2 run sensors_tools_ros query_server
        - source install/setup.bash && ros2 launch sensors_tools_ros republish_compressed.launch.xml override_file:=config/ground_station/qos_override.yaml
        - echo "ros2 param set /bloomxai_server semantics.sim_query_index 0"